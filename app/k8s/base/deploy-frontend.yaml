apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finapp
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: frontend
        image: us-docker.pkg.dev/REPLACE_ME/finapp/frontend:latest
        ports:
          - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 101
          capabilities: { drop: ["ALL"] }
        volumeMounts:
          - name: nginx-run
            mountPath: /var/run
          - name: nginx-cache
            mountPath: /var/cache/nginx
      volumes:
        - name: nginx-run
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
